# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
    steps:
    - uses: actions/checkout@v4
    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
    - name: Install dependencies(Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git make \
        pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
        libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
        libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
        libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
        libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev \
        libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev ninja-build libpng-dev libfreetype-dev libharfbuzz-dev patchelf
    - name: Download PackSigner binaries (Linux)
      if: runner.os == 'Linux'
      uses: robinraju/release-downloader@v1.11
      with:
        repository: 'Cold-Mint/GlimmerWorksPackSigner'
        latest: true
        fileName: 'packSigner-linux-*'
        out-file-path: 'bin'
    - name: Download PackSigner binaries (Windows)
      if: runner.os == 'Windows'
      uses: robinraju/release-downloader@v1.11
      with:
        repository: 'Cold-Mint/GlimmerWorksPackSigner'
        latest: true
        fileName: 'packSigner-windows-amd64-*.exe'
        out-file-path: 'bin'
    - name: Locate PackSigner executable
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          pattern="packSigner-linux-*"
        else
          pattern="packSigner-windows-amd64-*.exe"
        fi
        \
        exe_path_rel=$(find bin -name "$pattern" -type f | head -n1 | tr -d '\r')
        exe_path="${{ github.workspace }}/$exe_path_rel"
        # Replace backslashes in the path with forward slashes to avoid CMake escaping issues
        # 将路径中的反斜杠替换为正斜杠，避免 CMake 转义问题
        exe_path="${exe_path//\\//}"
        echo "PACK_SIGNER_EXE=$exe_path" >> $GITHUB_ENV
      shell: bash
    - name: Set executable permission on Linux
      if: runner.os == 'Linux'
      run: sudo chmod +x "$PACK_SIGNER_EXE"
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: ${{ steps.strings.outputs.build-output-dir }}
        # Key includes OS, compiler, build type, and a hash of all CMake configuration files.
        # This way the cache is invalidated when any CMakeLists.txt or .cmake file changes.
        key: ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.cpp_compiler }}-${{ matrix.build_type }}-cmake-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.cpp_compiler }}-${{ matrix.build_type }}-cmake-
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      env:
        SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        SIGN_PUBLIC_KEY: ${{ secrets.SIGN_PUBLIC_KEY }}
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DPACK_SIGNER_EXE=${{ env.PACK_SIGNER_EXE }}
        -DSIGN_PRIVATE_KEY="${{ env.SIGN_PRIVATE_KEY }}"
        -DSIGN_PUBLIC_KEY="${{ env.SIGN_PUBLIC_KEY }}"
        -G Ninja
        -S ${{ github.workspace }}
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      env:
        SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        SIGN_PUBLIC_KEY: ${{ secrets.SIGN_PUBLIC_KEY }}
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DPACK_SIGNER_EXE=${{ env.PACK_SIGNER_EXE }}
        -DSIGN_PRIVATE_KEY="${{ env.SIGN_PRIVATE_KEY }}"
        -DSIGN_PUBLIC_KEY="${{ env.SIGN_PUBLIC_KEY }}"
        -G "Ninja"
        -S ${{ github.workspace }}
    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}
    - name: Pack
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: cpack -C ${{ matrix.build_type }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: GlimmerWorks-Package-${{ matrix.os }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/dist/Release/*.7z
          ${{ steps.strings.outputs.build-output-dir }}/dist/Release/*.tar.zst
        archive: false
       
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Debug - List all downloaded files
        run: |
          echo "=== 正在检查 artifacts 目录的完整结构 ==="
          if command -v tree &> /dev/null; then
            tree artifacts
          else
            ls -R artifacts
          fi
          echo "========================================"
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/GlimmerWorks-*-Release-Linux-wayland-x64.tar.zst
            artifacts/GlimmerWorks-*-Release-Windows-x64.7z
          generate_release_notes: true
