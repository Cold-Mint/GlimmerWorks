config_version = 1

# Runtime data storage path
# 运行时数据存放路径
runtime_path = "runtime"

[window]
# Window width (pixels)
# 窗口宽度（像素）
width = 1920
# Window height (pixels)
# 窗口高度（像素）
height = 1080
# Is it full screen
# 是否全屏
fullscreen = false
# After being idle and without any operation for a certain period of time, the frame rate will start to decrease (unit: seconds).
# -1 indicates that the function is turned off.
# 闲置无操作多久后开始降帧 (单位：秒)，-1为关闭功能。
idle_delay = 10.0
# The minimum rendering frame rate locked in the idle state
# 闲置状态下锁定的最低渲染帧率
idle_target_fps = 15.0
# The baseline frame rate during normal gameplay
# 正常游玩时的基准帧率（帧/秒）
normal_target_fps = 60.0
# UI scaling factor
# UI界面缩放比例
ui_scale = 1.0
# Enable vertical sync (VSync)
# 启用垂直同步
vsync = true

[audio]
# Master volume
# 主音量
master_volume = 1.0
# channels
# 声道数
channels = 2
#freq
#采样率
freq = 44100

# Audio data format
# 音频数据格式
# Optional values: F32, S32, S16, U8
# 可选值：F32, S32, S16, U8
#
# F32 ：Floating-point 32-bit | 32位浮点型
#       Best quality, no distortion, modern standard(Default)
#       音质最好、无失真、现代游戏标准(默认)
#
# S16 ：Signed integer 16-bit | 16位整型
#       Lightweight, good compatibility, low CPU usage
#       轻量省电、兼容性强、低配设备首选
#
# S32 ：Signed integer 32-bit | 32位整型
#       High precision, but not necessary for games
#       精度高，但游戏中无明显优势
#
# U8 ：Unsigned 8-bit | 8位无符号型
#       Lowest quality, only for retro/chiptune
#       音质差，仅用于复古/8-bit音效
#
format = "F32"

# Audio track group configuration (pre-allocate fixed track pool for each audio type, reuse to avoid performance issues)
# 音频轨道组配置（按音频类型分配固定轨道池，预创建复用，避免频繁创建销毁）
[[audio.track]]
#BGM
type = 0
#The number of pre-allocated orbits of this type
#该类型预分配的轨道数量
track_count = 1
volume = 1.0

[[audio.track]]
#AMBIENT
#环境音效
type = 1
track_count = 20
volume = 1.0

[world]
# Preload config for off-screen chunks (view range expansion)
# 屏幕外区块预加载配置（视野范围扩展）
# Preload chunk outer radius (view range expansion)
# 区块预加载外扩范围（视野范围扩展）
preload_chunk_radius = 1.0
# Preload structure radius (terrain/structure data pre-calc)
# 结构预加载范围（地形/结构数据预计算）
preload_structure_radius = 5.0
# Preload lighting radius (lightmap/sky/block light pre-calc)
# 光照预加载范围（光照贴图/天空光/方块光照预计算）
# Constraint: Must be ≤ preload_chunk_radius. No tiles available for lighting calculation beyond the chunk range.
# 约束：必须 ≤ preload_chunk_radius，超出区块范围无瓦片可计算光照
preload_lighting_radius = 1.0
# Block generation and recycling interval (seconds)
# Periodically detect and generate new blocks that enter the field of view, and remove and delete redundant blocks that are far from the field of view.
# Set to 0 to execute every frame
# 区块生成与回收间隔（秒）
# 定时检测、生成新进入视野的区块，卸载删除远离视野的冗余区块
# 设置为 0 则每帧执行
chunk_spawn_clean_interval = 0.5
# How many terrain unloading tasks are executed each time?(Set to 0 for all to execute)
# 每次执行多少个地形卸载任务。（设置为0全部执行）
unload_terrain_batch = 10
# Interval for unloading terrain task (seconds)
# Set to 0 to execute every frame
# 卸载地形任务间隔（秒）
# 设置为 0 则每帧执行
unload_terrain_interval = 0.03
# How many chunk unloading tasks are executed each time?(Set to 0 for all to execute)
# 每次执行多少个区块卸载任务。（设置为0全部执行）
unload_chunk_batch = 1
# Interval for unloading chunk task (seconds)
# Set to 0 to execute every frame
# 卸载区块任务间隔（秒）
# 设置为 0 则每帧执行
unload_chunk_interval = 0.03
# Interval for loading chunk task (seconds)
# Set to 0 to execute every frame
# 加载区块任务间隔（秒）
# 设置为 0 则每帧执行
load_chunk_interval = 0.03
# How many terrain loading tasks are executed each time?(Set to 0 for all to execute)
# 每次执行多少个地形加载任务。（设置为0全部执行）
load_terrain_batch = 10
# Interval for loading terrain task (seconds)
# Set to 0 to execute every frame
# 加载地形任务间隔（秒）
# 设置为 0 则每帧执行
load_terrain_interval = 0.03
# How many chunk loading tasks are executed each time?(Set to 0 for all to execute)
# 每次执行多少个区块加载任务。（设置为0全部执行）
load_chunk_batch = 1

[animation]
# Duration of the block fade-in animation (unit: seconds)
# 区块淡入动画时长 单位：秒
chunk_fadein_duration = 0.2
chunk_fadein_from = 0.0
chunk_fadein_to = 1.0

[command]
# Number of chunks traversed in the positive/negative X direction when using the `locate biome` command.
# 使用 locate biome 命令时，沿 X 轴正 / 负方向遍历的区块数量。
locate_max_radius_search_chunks = 2048

[mods]
# Data pack storage path
# 数据包存储路径
data_pack_path = "mods/data_packs"
# Resource pack storage path
# 资源包存储路径
resource_pack_path = "mods/resource_packs"
# Enabled data packs (list of pack IDs)
# 启用的数据包（包ID列表）
enabled_data_pack = ["glimmerworks"]
# Enabled resource packs (list of pack IDs)
# 启用的资源包（包ID列表）
enabled_resource_pack = ["glimmerworks_res"]
# Supported audio formats
# 支持的音频格式
# The SDL_mix library used in the game can decode more audio formats. However, in order to standardize the audio format used, it is restricted here to only load the following types.
# 游戏使用的SDL_mix库，虽然能够解码更多格式的音频，但是为了规范使用的音频格式，所以在这里限制了只能加载以下类型。
# The audio that comes earlier will be loaded first. For example, if supportedAudioFormats = ["ogg", "wav"], when searching for "block_brack", it will first search for "block_brack.ogg" and then "block_brack.wav".
# 排在前面的音频会被优先加载。例如supportedAudioFormats = ["ogg"，"wav"]，查找"block_brack"时，会优先搜索"block_brack.ogg"其次是"block_brack.wav"
# The release build has been trimmed to support only OGG. To support additional formats, you need to modify the CMakeLists.txt and recompile the game.
# 发行版已被裁减为仅支持ogg，支持更多格式需要修改CMakeLists.txt重新编译游戏。
supported_audio_formats = ["ogg"]
# Supported texture formats
# 支持的纹理格式
# The textures that come earlier will be loaded first.
# 排在前面的纹理会被优先加载。
# The release build has been trimmed to support only PNG. To support additional formats, you need to modify the CMakeLists.txt and recompile the game.
# 发行版已被裁减为仅支持png，支持更多格式需要修改CMakeLists.txt重新编译游戏。
supported_texture_formats = ["png"]

[console]
# Maximum number of console history entries to save (0 = disable history function)
# 控制台历史记录最大保存条数（0 = 禁用历史记录功能）
max_history_entries = 100

[[command_hooks]]
hook_id = "cb2bfd40-c389-468b-ae11-032e8e2b00b7"
command = "screenShot create"
code = "f2"
event_type = "key_down"